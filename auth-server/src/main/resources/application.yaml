server:
  port: 9000

spring:
  application:
    name: auth-server

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3314/db_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: auth_user
    password: auth_pass
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
