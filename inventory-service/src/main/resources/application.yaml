server:
  port: 8083

spring:
  application:
    name: inventory-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3314/db_inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: inventory_user
    password: inventory_pass
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

  cloud:
    stream:
      function:
        definition: reserveStock;releaseStock;confirmReservation
      bindings:
        reserveStock-in-0:
          destination: order.created
          group: inventory-reserve-group
          consumer:
            maxAttempts: 3
            backOffInitialInterval: 1000
            backOffMultiplier: 2.0
        releaseStock-in-0:
          destination: payment.failed
          group: inventory-release-group
        confirmReservation-in-0:
          destination: payment.processed
          group: inventory-confirm-group
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          reserveStock-in-0:
            consumer:
              enableDlq: true
              dlqName: inventory.reserve.dlq
              dlq-partitions: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway

  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    endpoint: http://localhost:9411/api/v2/spans

  prometheus:
    metrics:
      export:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
