server:
  port: 8080

spring:
  application:
    name: api-gateway

  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-server
              uri: http://localhost:9000
              predicates:
                - Path=/auth/**,/oauth2/**,/.well-known/**,/login
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**
            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/products/**
            - id: order-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/orders/**
            - id: ai-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/ai/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway

  endpoint:
    health:
      show-details: always

    gateway:
      access: read-only

  tracing:
    sampling:
      probability: 1.0

    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans
  prometheus:
    metrics:
      export:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      order-service:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s

  ratelimiter:
    instances:
      gateway:
        limit-for-period: 100
        limit-refresh-period: 1s

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"