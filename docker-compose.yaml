volumes:
  mysql-auth-data:
  mysql-orders-data:
  mysql-payments-data:
  mongo-customer-data:
  mongo-product-data:
  mongo-config-data:
  redis-data:
  kafka-data:
  keycloak-data:
  debezium-data:

networks:
  ecommerce-net:
    driver: bridge
    name: ecommerce-net

services:

  mysql-auth:
    image: mysql:9.7
    container_name: mysql-auth
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_AUTH_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: authdb
      MYSQL_USER: ${MYSQL_AUTH_USER:-authuser}
      MYSQL_PASSWORD: ${MYSQL_AUTH_PASSWORD:-authpassword}
    ports:
      - "3305:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_AUTH_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-orders:
    image: mysql:9.7
    container_name: mysql-orders
    restart: unless-stopped
    command:
      - --server-id=2
      - --log-bin=mysql-bin
      - --binlog-row-image=FULL
      - --binlog-expire-logs-seconds=259200
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ORDERS_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ordersdb
      MYSQL_USER: ${MYSQL_ORDERS_USER:-ordersuser}
      MYSQL_PASSWORD: ${MYSQL_ORDERS_PASSWORD:-orderspassword}
    ports:
      - "3307:3306"
    volumes:
      - mysql-orders-data:/var/lib/mysql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ORDERS_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-payments:
    image: mysql:9.7
    container_name: mysql-payments
    restart: unless-stopped
    command:
      - --server-id=3
      - --log-bin=mysql-bin
      - --binlog-row-image=FULL
      - --binlog-expire-logs-seconds=259200
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PAYMENTS_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: paymentsdb
      MYSQL_USER: ${MYSQL_PAYMENTS_USER:-paymentsuser}
      MYSQL_PASSWORD: ${MYSQL_PAYMENTS_PASSWORD:-paymentspassword}
    ports:
      - "3308:3306"
    volumes:
      - mysql-payments-data:/var/lib/mysql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PAYMENTS_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-customer:
    image: mongo:8
    container_name: mongo-customer
    restart: unless-stopped
    command: ["--replSet", "rs-customer", "--bind_ip_all", "--port", "27017"]
    environment:
      MONGO_INITDB_DATABASE: customerdb
    ports:
      - "27016:27017"
    volumes:
      - mongo-customer-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--quiet", "--eval", "try { rs.status().ok } catch(e) { db.runCommand('ping').ok }"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  mongo-customer-init:
    image: mongo:8
    container_name: mongo-customer-init
    restart: "no"
    depends_on:
      mongo-customer:
        condition: service_healthy
    entrypoint: >
      bash -c "
      mongosh --host mongo-customer:27017 --eval '
        rs.initiate({
          _id: \"rs-customer\",
          members: [{ _id: 0, host: \"mongo-customer:27017\" }]
        })
      '
      "
    networks:
      - ecommerce-net

  mongo-product:
    image: mongo:8
    container_name: mongo-product
    restart: unless-stopped
    command: ["--replSet", "rs-product", "--bind_ip_all", "--port", "27017"]
    environment:
      MONGO_INITDB_DATABASE: productdb
    ports:
      - "27018:27017"
    volumes:
      - mongo-product-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--quiet", "--eval", "try { rs.status().ok } catch(e) { db.runCommand('ping').ok }"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  mongo-product-init:
    image: mongo:8
    container_name: mongo-product-init
    restart: "no"
    depends_on:
      mongo-product:
        condition: service_healthy
    entrypoint: >
      bash -c "
      mongosh --host mongo-product:27017 --eval '
        rs.initiate({
          _id: \"rs-product\",
          members: [{ _id: 0, host: \"mongo-product:27017\" }]
        })
      '
      "
    networks:
      - ecommerce-net

  mongo-config:
    image: mongo:8
    container_name: mongo-config
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: configdb
    ports:
      - "27019:27017"
    volumes:
      - mongo-config-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic order-events --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-events --partitions 3 --replication-factor 1
      "
    networks:
      - ecommerce-net

  debezium:
    image: debezium/connect:3.0.0.Final
    container_name: debezium
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mysql-orders:
        condition: service_healthy
      mysql-payments:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium-configs
      OFFSET_STORAGE_TOPIC: debezium-offsets
      STATUS_STORAGE_TOPIC: debezium-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /kafka/connect
    ports:
      - "8083:8083"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --hostname-strict=false
      - --http-enabled=true
      - --http-port=8080
      - --health-enabled=true
      - --metrics-enabled=true
    depends_on:
      mysql-auth:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_LOG_LEVEL: info
    ports:
      - "8080:8080"
      - "9001:9000"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  kong:
    image: kong:3.7
    container_name: kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: bundled,jwt,cors,rate-limiting
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    networks:
      - ecommerce-net
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s