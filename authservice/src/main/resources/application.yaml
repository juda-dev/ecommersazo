server:
  port: 8081

spring:
  application:
    name: authservice

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3305/authdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_AUTH_USER:authuser}
    password: ${MYSQL_AUTH_PASSWORD:authpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: AuthPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/ecommerce
          jwk-set-uri: http://localhost:8080/realms/ecommerce/protocol/openid-connect/certs

keycloak:
  server-url: http://localhost:8080
  realm: ecommerce
  client-id: ecommerce-client
  client-secret: ${KEYCLOAK_CLIENT_SECRET:vp5kKq1OLH3L4xCEsOeb0rwPke6LhgvO}
  admin-username: admin
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.ecommerce.authservice: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN