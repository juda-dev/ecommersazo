serve:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: products-post
          uri: lb://msvc-products-api
          predicates:
            - Path:/api/products/**
            - Method=POST,PUT,DELETE
          filters:
            - StripPrefix=2
        - id: products-get
          uri: lb://msvc-products-query
          predicates:
            - Path=/api/products/**
            - Method=GET
          filters:
            - StripPrefix=2
